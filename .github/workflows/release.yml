name: Build mod release

# Собирает устанавливаемый ZIP мода и прикрепляет его к GitHub Release.
# Триггер: пуш тега вида v0.1.0  (или ручной запуск через "Run workflow").

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build mod zip
        run: bash tools/build_release.sh

      # Любой запуск (в т.ч. ручной "Run workflow") оставляет готовый к установке
      # мод на странице прогона: Actions → выбрать run → раздел Artifacts →
      # скачать "Mormal-AI-mod". Внутри — папка Mormal-AI/ и Mormal-AI.mod,
      # которые кладутся прямо в каталог mod/ игры (один распак, без вложенных zip).
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mormal-AI-mod
          path: |
            build/Mormal-AI
            build/Mormal-AI.mod

      # Релиз создаётся ТОЛЬКО при пуше тега vX.Y.Z (не при ручном запуске).
      - name: Attach zip to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
